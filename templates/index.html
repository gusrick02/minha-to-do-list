<!DOCTYPE html>
<html lang="pt-br">

<head>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<meta charset="UTF-8">
<title>Minha To Do List</title>
</head>

<body>

<div class="container">

<h1>Minha To Do List</h1>

<form action="/add" method="post" class="task-form">
<input type="text" name="tarefa" placeholder="Nova tarefa" required>
<button type="submit">Adicionar</button>
</form>

<ul>

{% for tarefa in tarefas %}

<li>

<input type="checkbox"
onclick="window.location.href='/toggle/{{ tarefa.id }}'"
{% if tarefa.feito %}checked{% endif %}>

<span>{{ tarefa.texto }}</span>

<a class="delete" href="/delete/{{ tarefa.id }}">✖</a>

</li>

{% endfor %}

</ul>

</div>

</body>
</html>
